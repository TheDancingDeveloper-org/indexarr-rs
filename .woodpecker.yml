when:
  - event: push
    branch: main
  - event: tag
  - event: manual
  - event: pull_request

# Every step uses Linux container images or the Linux Docker socket. Without
# an explicit constraint Woodpecker may schedule this workflow on a Windows
# local-backend agent and attempt to execute the image name as a host binary.
labels:
  platform: linux/amd64

variables:
  - &cargo_setup |
      printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$GIT_AUTH_TOKEN" > "$CARGO_HOME/credentials.toml"

steps:
  - name: fmt
    image: rust:1.97-bookworm
    commands:
      - rustup component add rustfmt
      - cargo fmt --all -- --check

  - name: check
    image: rust:1.97-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - cargo check --workspace --all-targets --locked
    depends_on: [fmt]

  - name: test
    image: rust:1.97-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - cargo test --workspace --locked
      - cargo test --workspace --doc --locked
    depends_on: [check]

  - name: clippy
    image: rust:1.97-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - rustup component add clippy
      - cargo clippy --workspace --all-targets --locked -- -D warnings
    depends_on: [test]

  - name: build-ui
    image: node:22-bookworm-slim
    commands:
      - cd ui && npm ci --no-audit --no-fund && npm audit --audit-level=high && npm run build:check
    when:
      - event: tag
      - event: manual
    depends_on: [clippy]

  - name: build-linux
    image: rust:1.97-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - export CARGO_PROFILE_RELEASE_LTO=fat CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 CARGO_PROFILE_RELEASE_STRIP=symbols
      - cargo build --release --locked
      - test -x target/release/indexarr
    when:
      - event: tag
      - event: manual
    depends_on: [build-ui]

  - name: build-linux-arm64
    image: rust:1.97-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - apt-get update && apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross cmake
      - rustup target add aarch64-unknown-linux-gnu
      - export CARGO_PROFILE_RELEASE_LTO=fat CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 CARGO_PROFILE_RELEASE_STRIP=symbols
      - CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc cargo build --release --target aarch64-unknown-linux-gnu --features vendored-ssl --locked
      - test -x target/aarch64-unknown-linux-gnu/release/indexarr
    when:
      - event: tag
      - event: manual
    depends_on: [build-linux]

  - name: build-windows
    image: rust:1.97-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - rm -rf ~/.cache/cargo-xwin
      - apt-get update && apt-get install -y --no-install-recommends clang llvm lld cmake nasm nsis curl unzip
      - cargo install cargo-xwin@0.18.6 --index https://github.com/rust-lang/crates.io-index --locked
      - rustup target add x86_64-pc-windows-msvc
      - export CARGO_PROFILE_RELEASE_LTO=fat CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 CARGO_PROFILE_RELEASE_STRIP=symbols
      - cargo xwin build --release --target x86_64-pc-windows-msvc --locked
      - test -f target/x86_64-pc-windows-msvc/release/indexarr.exe
      - curl -fL https://get.enterprisedb.com/postgresql/postgresql-17.4-1-windows-x64-binaries.zip -o installer/pgsql.zip
      - cp target/x86_64-pc-windows-msvc/release/indexarr.exe installer/indexarr.exe
      - cp -a ui/dist installer/dist
      - makensis -DVERSION="$CI_COMMIT_TAG" -DPGVERSION=17.4 installer/windows.nsi
      - test -f "installer/indexarr-$CI_COMMIT_TAG-windows-x86_64-setup.exe"
      - rm -f installer/pgsql.zip installer/indexarr.exe
      - rm -rf installer/dist
    when:
      - event: tag
    depends_on: [build-linux-arm64]

  - name: package-release
    image: alpine:3.23
    commands:
      - apk add --no-cache coreutils
      - ci/tasks/package-release
    when:
      - event: tag
    depends_on: [build-windows]

  # Main builds an immutable amd64 candidate. Mutable development tags move
  # only after that exact image passes the runtime smoke test.
  - name: build-candidate
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - printf '%s' "$GIT_AUTH_TOKEN" | docker login repo.indexarr.net -u x-access-token --password-stdin
      - docker buildx create --name "indexarr-$CI_PIPELINE_NUMBER" --driver docker-container --use
      - docker buildx build --platform linux/amd64 --provenance=false --secret id=git_auth_token,env=GIT_AUTH_TOKEN --build-arg INDEXARR_BUILD_REF="$CI_COMMIT_SHA" --build-arg INDEXARR_BUILD_REVISION="$CI_COMMIT_SHA" -t "repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_SHA" --push .
      - docker buildx rm "indexarr-$CI_PIPELINE_NUMBER"
    when:
      - event: push
        branch: main
      - event: manual
        branch: main
    depends_on: [clippy]

  - name: smoke-candidate
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - printf '%s' "$GIT_AUTH_TOKEN" | docker login repo.indexarr.net -u x-access-token --password-stdin
      - ci/tasks/smoke-runtime "repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_SHA" "$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
    when:
      - event: push
        branch: main
      - event: manual
        branch: main
    depends_on: [build-candidate]

  - name: promote-dev
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      FORGEJO_TOKEN:
        from_secret: git_auth_token
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - printf '%s' "$FORGEJO_TOKEN" | docker login repo.indexarr.net -u x-access-token --password-stdin
      - printf '%s' "$GH_TOKEN" | docker login ghcr.io -u AusAgentSmith --password-stdin
      - SRC="repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_SHA"
      - docker buildx imagetools create -t repo.indexarr.net/indexarr/indexarr-rs:dev "$SRC"
      - docker buildx imagetools create -t "ghcr.io/ausagentsmith-org/indexarr-rs:$CI_COMMIT_SHA" "$SRC"
      - docker buildx imagetools create -t ghcr.io/ausagentsmith-org/indexarr-rs:dev "$SRC"
    when:
      - event: push
        branch: main
      - event: manual
        branch: main
    depends_on: [smoke-candidate]

  - name: mirror-github-main
    image: alpine:3.23
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - apk add --no-cache git
      - ci/tasks/mirror-github branch
    when:
      - event: push
        branch: main
    depends_on: [promote-dev]

  - name: comment-github-issues
    image: alpine:3.23
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - apk add --no-cache curl jq
      - ci/tasks/comment-github-issues
    when:
      - event: push
        branch: main
    depends_on: [mirror-github-main]

  - name: komodo-deploy
    image: alpine:3.23
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      KOMODO_API_KEY:
        from_secret: komodo_api_key
      KOMODO_API_SECRET:
        from_secret: komodo_api_secret
      KOMODO_URL: http://100.92.54.45:3011
    commands:
      - apk add --no-cache bash git curl python3 >/dev/null
      - 'curl -sSf -H "Authorization: token $GIT_AUTH_TOKEN" -o /tmp/komodo-deploy.sh https://repo.indexarr.net/indexarr/ops/raw/branch/main/scripts/komodo-deploy.sh'
      - chmod +x /tmp/komodo-deploy.sh
      - STACK_NAME=prod-indexarr STACK_DIR=prod/indexarr IMAGE_NAME=repo.indexarr.net/indexarr/indexarr-rs IMAGE_TAG=$CI_COMMIT_SHA bash /tmp/komodo-deploy.sh
    when:
      - event: manual
        branch: main
    depends_on: [promote-dev]

  # Tagged releases build per-architecture immutable candidates.
  - name: build-release-amd64
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - printf '%s' "$GIT_AUTH_TOKEN" | docker login repo.indexarr.net -u x-access-token --password-stdin
      - docker buildx create --name "indexarr-release-amd64-$CI_PIPELINE_NUMBER" --driver docker-container --use
      - docker buildx build --platform linux/amd64 --provenance=false --secret id=git_auth_token,env=GIT_AUTH_TOKEN --build-arg INDEXARR_BUILD_REF="$CI_COMMIT_TAG" --build-arg INDEXARR_BUILD_REVISION="$CI_COMMIT_SHA" -t "repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_TAG-amd64" --push .
      - docker buildx rm "indexarr-release-amd64-$CI_PIPELINE_NUMBER"
    when:
      - event: tag
    depends_on: [package-release]

  - name: build-release-arm64
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - printf '%s' "$GIT_AUTH_TOKEN" | docker login repo.indexarr.net -u x-access-token --password-stdin
      - docker buildx create --name "indexarr-release-arm64-$CI_PIPELINE_NUMBER" --driver docker-container --use
      - docker buildx build --platform linux/arm64 --provenance=false --secret id=git_auth_token,env=GIT_AUTH_TOKEN --build-arg INDEXARR_BUILD_REF="$CI_COMMIT_TAG" --build-arg INDEXARR_BUILD_REVISION="$CI_COMMIT_SHA" -t "repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_TAG-arm64" --push .
      - docker buildx rm "indexarr-release-arm64-$CI_PIPELINE_NUMBER"
    when:
      - event: tag
    depends_on: [package-release]

  - name: smoke-release-amd64
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - printf '%s' "$GIT_AUTH_TOKEN" | docker login repo.indexarr.net -u x-access-token --password-stdin
      - ci/tasks/smoke-runtime "repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_TAG-amd64" "${CI_COMMIT_TAG#v}"
    when:
      - event: tag
    depends_on: [build-release-amd64, build-release-arm64]

  - name: manifest-release
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - printf '%s' "$GIT_AUTH_TOKEN" | docker login repo.indexarr.net -u x-access-token --password-stdin
      - docker buildx imagetools create -t "repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_TAG" "repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_TAG-amd64" "repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_TAG-arm64"
    when:
      - event: tag
    depends_on: [smoke-release-amd64]

  - name: promote-release
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      FORGEJO_TOKEN:
        from_secret: git_auth_token
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - printf '%s' "$FORGEJO_TOKEN" | docker login repo.indexarr.net -u x-access-token --password-stdin
      - printf '%s' "$GH_TOKEN" | docker login ghcr.io -u AusAgentSmith --password-stdin
      - SRC="repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_TAG"
      - docker buildx imagetools create -t repo.indexarr.net/indexarr/indexarr-rs:latest "$SRC"
      - docker buildx imagetools create -t "ghcr.io/ausagentsmith-org/indexarr-rs:$CI_COMMIT_TAG" "$SRC"
      - docker buildx imagetools create -t ghcr.io/ausagentsmith-org/indexarr-rs:latest "$SRC"
    when:
      - event: tag
    depends_on: [manifest-release]

  - name: verify-release-images
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      FORGEJO_TOKEN:
        from_secret: git_auth_token
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - printf '%s' "$FORGEJO_TOKEN" | docker login repo.indexarr.net -u x-access-token --password-stdin
      - printf '%s' "$GH_TOKEN" | docker login ghcr.io -u AusAgentSmith --password-stdin
      - for ref in "repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_TAG" repo.indexarr.net/indexarr/indexarr-rs:latest "ghcr.io/ausagentsmith-org/indexarr-rs:$CI_COMMIT_TAG" ghcr.io/ausagentsmith-org/indexarr-rs:latest; do output=$(docker buildx imagetools inspect "$ref"); printf '%s' "$output" | grep -q 'linux/amd64'; printf '%s' "$output" | grep -q 'linux/arm64'; done
    when:
      - event: tag
    depends_on: [promote-release]

  - name: mirror-github-tag
    image: alpine:3.23
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - apk add --no-cache git
      - ci/tasks/mirror-github tag
    when:
      - event: tag
    depends_on: [verify-release-images]

  - name: github-release
    image: alpine:3.23
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - apk add --no-cache curl jq
      - |
        set -eu
        TAG="$CI_COMMIT_TAG"
        REPO="AusAgentSmith-org/indexarr-rs"
        NOTES="RELEASE_NOTES_$TAG.md"
        OUT=".ci-output/packages"
        test -f "$NOTES"
        jq -n --arg tag "$TAG" --arg name "Indexarr $TAG" --rawfile body "$NOTES" '{tag_name:$tag,target_commitish:"main",name:$name,body:$body,draft:false,prerelease:false}' > /tmp/release.json
        RELEASE_ID=$(curl -fsS -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" --data-binary @/tmp/release.json "https://api.github.com/repos/$REPO/releases" | jq -r .id)
        test -n "$RELEASE_ID" && test "$RELEASE_ID" != null
        for file in "$OUT"/indexarr-* "$OUT"/SHA256SUMS-*; do
          name=$(basename "$file")
          curl -fsS -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/octet-stream" --data-binary "@$file" "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$name" >/dev/null
        done
    when:
      - event: tag
    depends_on: [mirror-github-tag]

  - name: discord-release
    image: alpine:3.23
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_changelog_webhook_url
    commands:
      - apk add --no-cache curl jq >/dev/null
      - BODY=$(head -c 3500 "RELEASE_NOTES_$CI_COMMIT_TAG.md")
      - jq -n --arg tag "$CI_COMMIT_TAG" --arg body "$BODY" --arg url "https://github.com/AusAgentSmith-org/indexarr-rs/releases/tag/$CI_COMMIT_TAG" '{embeds:[{title:("Indexarr "+$tag),url:$url,description:$body,color:5025616,timestamp:(now|todate)}]}' > /tmp/discord.json
      - 'curl -fsS -H "Content-Type: application/json" --data-binary @/tmp/discord.json "$DISCORD_WEBHOOK_URL" || true'
    when:
      - event: tag
    depends_on: [github-release]
