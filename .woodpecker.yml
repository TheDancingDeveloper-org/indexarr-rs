when:
  - event: push
    branch: main
  - event: tag
  - event: manual
  - event: pull_request

variables:
  # Inject the Forgejo cargo registry credentials at the start of every Rust
  # step. The repo-local `.cargo/config.toml` defines the registry; this just
  # writes the bearer token into $CARGO_HOME/credentials.toml.
  - &cargo_setup |
      printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$GIT_AUTH_TOKEN" > $CARGO_HOME/credentials.toml

steps:

  # ── Code quality ─────────────────────────────────────────────────────────────

  - name: fmt
    image: rust:1.88-bookworm
    commands:
      - rustup component add rustfmt
      - cargo fmt --all -- --check

  - name: check
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - cargo check --workspace

  - name: test
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - cargo test --workspace

  - name: clippy
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - rustup component add clippy
      - cargo clippy --workspace -- -D warnings

  # ── UI build ──────────────────────────────────────────────────────────────────

  - name: build-ui
    image: node:22-bookworm-slim
    commands:
      - cd ui && npm ci && npm run build
    when:
      - event: tag
      - event: manual

  # ── Linux binary + tarball ───────────────────────────────────────────────────

  - name: build-linux
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - |
        if [ -n "$CI_COMMIT_TAG" ]; then
          export CARGO_PROFILE_RELEASE_LTO=fat
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          export CARGO_PROFILE_RELEASE_STRIP=symbols
        fi
      - cargo build --release
      - ls -lh target/release/indexarr
      - |
        if [ -n "$CI_COMMIT_TAG" ]; then
          TAG="$CI_COMMIT_TAG"
        else
          TAG=$(echo $CI_COMMIT_SHA | head -c 9)
        fi
        mkdir -p staging/ui
        cp target/release/indexarr staging/indexarr
        cp -r ui/dist staging/ui/dist
        tar -czf "indexarr-$TAG-linux-x86_64.tar.gz" -C staging .
        ls -lh "indexarr-$TAG-linux-x86_64.tar.gz"
    when:
      - event: tag
      - event: manual

  # ── Linux ARM64 binary + tarball ────────────────────────────────────────────

  - name: build-linux-arm64
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - apt-get update && apt-get install -y --no-install-recommends
          gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          libc6-dev-arm64-cross cmake
      - rustup target add aarch64-unknown-linux-gnu
      - |
        if [ -n "$CI_COMMIT_TAG" ]; then
          export CARGO_PROFILE_RELEASE_LTO=fat
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          export CARGO_PROFILE_RELEASE_STRIP=symbols
        fi
      - CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          cargo build --release --target aarch64-unknown-linux-gnu --features vendored-ssl
      - ls -lh target/aarch64-unknown-linux-gnu/release/indexarr
      - |
        if [ -n "$CI_COMMIT_TAG" ]; then
          TAG="$CI_COMMIT_TAG"
        else
          TAG=$(echo $CI_COMMIT_SHA | head -c 9)
        fi
        mkdir -p staging-arm64/ui
        cp target/aarch64-unknown-linux-gnu/release/indexarr staging-arm64/indexarr
        cp -r ui/dist staging-arm64/ui/dist
        tar -czf "indexarr-$TAG-linux-aarch64.tar.gz" -C staging-arm64 .
        ls -lh "indexarr-$TAG-linux-aarch64.tar.gz"
    when:
      - event: tag
      - event: manual

  # ── Windows binary + NSIS installer ─────────────────────────────────────────

  - name: build-windows
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - *cargo_setup
      - rm -rf ~/.cache/cargo-xwin
      - apt-get update && apt-get install -y --no-install-recommends clang llvm lld cmake nasm nsis
      - cargo install cargo-xwin@0.18.6 --index https://github.com/rust-lang/crates.io-index
      - rustup target add x86_64-pc-windows-msvc
      - |
        if [ -n "$CI_COMMIT_TAG" ]; then
          export CARGO_PROFILE_RELEASE_LTO=fat
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          export CARGO_PROFILE_RELEASE_STRIP=symbols
        fi
      - cargo xwin build --release --target x86_64-pc-windows-msvc
      - ls -lh target/x86_64-pc-windows-msvc/release/indexarr.exe
      - |
        if [ -n "$CI_COMMIT_TAG" ]; then
          TAG="$CI_COMMIT_TAG"
          PG_VERSION="17.4"
          echo "Downloading PostgreSQL $PG_VERSION binaries..."
          curl -fL "https://get.enterprisedb.com/postgresql/postgresql-$PG_VERSION-1-windows-x64-binaries.zip" \
            -o installer/pgsql.zip
          cp target/x86_64-pc-windows-msvc/release/indexarr.exe installer/indexarr.exe
          # Copy built UI into installer directory for NSIS to pick up
          cp -r ui/dist installer/dist
          makensis -DVERSION="$TAG" -DPGVERSION="$PG_VERSION" installer/windows.nsi
          ls -lh "installer/indexarr-$TAG-windows-x86_64-setup.exe"
          rm -f installer/pgsql.zip installer/indexarr.exe
          rm -rf installer/dist
        fi
    when:
      - event: tag
      - event: manual

  # ── Docker → GHCR ────────────────────────────────────────────────────────────

  - name: build-and-push
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      GHCR_TOKEN:
        from_secret: gh_release_token
    commands:
      - echo "$GHCR_TOKEN" | docker login ghcr.io -u AusAgentSmith --password-stdin
      - docker buildx create --name multiarch --use
      - docker buildx build
          --platform linux/amd64,linux/arm64
          --build-arg GIT_AUTH_TOKEN="$GIT_AUTH_TOKEN"
          -t ghcr.io/ausagentsmith-org/indexarr-rs:latest
          -t ghcr.io/ausagentsmith-org/indexarr-rs:$CI_COMMIT_SHA
          --push .
      - docker buildx rm multiarch
    when:
      - event: push
        branch: main

  # ── Komodo deploy to Node B ──────────────────────────────────────────────────

  - name: komodo-deploy
    image: alpine:3.23
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      KOMODO_API_KEY:
        from_secret: komodo_api_key
      KOMODO_API_SECRET:
        from_secret: komodo_api_secret
      KOMODO_URL: http://100.92.54.45:3011
    commands:
      - apk add --no-cache bash git curl python3 >/dev/null
      - 'curl -sSf -H "Authorization: token $GIT_AUTH_TOKEN" -o /tmp/komodo-deploy.sh https://repo.indexarr.net/indexarr/ops/raw/branch/main/scripts/komodo-deploy.sh'
      - chmod +x /tmp/komodo-deploy.sh
      - STACK_NAME=prod-indexarr STACK_DIR=prod/indexarr IMAGE_NAME=ghcr.io/ausagentsmith-org/indexarr-rs IMAGE_TAG=$CI_COMMIT_SHA bash /tmp/komodo-deploy.sh
    when:
      - event: push
        branch: main
      - event: manual
        branch: main

  - name: build-and-push-release
    image: docker:27
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      GHCR_TOKEN:
        from_secret: gh_release_token
    commands:
      - echo "$GHCR_TOKEN" | docker login ghcr.io -u AusAgentSmith --password-stdin
      - docker buildx create --name multiarch --use
      - docker buildx build
          --platform linux/amd64,linux/arm64
          --build-arg GIT_AUTH_TOKEN="$GIT_AUTH_TOKEN"
          -t ghcr.io/ausagentsmith-org/indexarr-rs:$CI_COMMIT_TAG
          -t ghcr.io/ausagentsmith-org/indexarr-rs:latest
          --push .
      - docker buildx rm multiarch
    when:
      - event: tag

  # ── GitHub release ───────────────────────────────────────────────────────────

  - name: github-release
    image: alpine:3.23
    when:
      - event: tag
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - apk add --no-cache curl jq
      - |
        set -e
        TAG="$CI_COMMIT_TAG"
        REPO="AusAgentSmith-org/indexarr-rs"

        # Bake version into the install script
        sed "s|^VERSION=.*|VERSION=\"$TAG\"|" installer/linux-install.sh \
          > "indexarr-$TAG-linux-install.sh"
        chmod +x "indexarr-$TAG-linux-install.sh"

        cp "target/x86_64-pc-windows-msvc/release/indexarr.exe" \
           "indexarr-$TAG-windows-x86_64.exe"
        cp "installer/indexarr-$TAG-windows-x86_64-setup.exe" .

        sha256sum \
          "indexarr-$TAG-linux-x86_64.tar.gz" \
          "indexarr-$TAG-linux-aarch64.tar.gz" \
          "indexarr-$TAG-linux-install.sh" \
          "indexarr-$TAG-windows-x86_64.exe" \
          "indexarr-$TAG-windows-x86_64-setup.exe" \
          > "SHA256SUMS-$TAG.txt"

        # Delete existing release if present
        EXISTING_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
          "https://api.github.com/repos/$REPO/releases/tags/$TAG" | jq -r '.id // empty')
        if [ -n "$EXISTING_ID" ]; then
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/$EXISTING_ID"
        fi

        BODY="## Quick install (Linux)\n\`\`\`bash\ncurl -fsSL https://github.com/$REPO/releases/download/$TAG/indexarr-$TAG-linux-install.sh | sudo bash\n\`\`\`\n\n"
        BODY="$BODY## Docker\n\`\`\`\ndocker pull ghcr.io/$REPO:$TAG\n\`\`\`\n\n"
        BODY="$BODY SHA256 checksums in \`SHA256SUMS-$TAG.txt\`"

        RELEASE_ID=$(curl -sf -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"main\",\"name\":\"indexarr $TAG\",\"body\":\"$BODY\",\"draft\":false,\"prerelease\":true}" \
          "https://api.github.com/repos/$REPO/releases" | jq -r '.id')

        [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ] || \
          { echo "ERROR: Failed to create release"; exit 1; }

        for file in \
          "indexarr-$TAG-linux-x86_64.tar.gz" \
          "indexarr-$TAG-linux-aarch64.tar.gz" \
          "indexarr-$TAG-linux-install.sh" \
          "indexarr-$TAG-windows-x86_64.exe" \
          "indexarr-$TAG-windows-x86_64-setup.exe" \
          "SHA256SUMS-$TAG.txt"; do
          [ -f "$file" ] || continue
          echo "Uploading $file..."
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$file" \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$file" > /dev/null
        done
        echo "Release $TAG complete."

  # ── Discord changelog (releases only) ────────────────────────────────────────

  - name: discord-release
    image: alpine:3.23
    when:
      - event: tag
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_changelog_webhook_url
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - apk add --no-cache curl jq >/dev/null
      - |
        TAG="$CI_COMMIT_TAG"
        REPO="AusAgentSmith-org/indexarr-rs"

        # Pull the freshly-published release notes from GitHub.
        BODY=$(curl -sf -H "Authorization: token $GH_TOKEN" \
          "https://api.github.com/repos/$REPO/releases/tags/$TAG" | jq -r '.body // ""')
        # Discord embed description cap is 4096 chars; truncate generously.
        BODY=$(printf '%s' "$BODY" | head -c 3500)

        PAYLOAD=$(jq -n --arg tag "$TAG" --arg repo "$REPO" --arg body "$BODY" \
          --arg url "https://github.com/$REPO/releases/tag/$TAG" \
          '{
            embeds: [{
              title: ("indexarr " + $tag),
              url: $url,
              description: $body,
              color: 5025616,
              footer: {text: $repo},
              timestamp: (now | todate)
            }]
          }')
        curl -sf -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL" || true

  # ── Discord notifications ─────────────────────────────────────────────────────

  - name: discord-success
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Successful\",
            \"description\": \"**$CI_REPO** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 5025616,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [success]

  - name: discord-failure
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Failed\",
            \"description\": \"**$CI_REPO** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 15548997,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [failure]
